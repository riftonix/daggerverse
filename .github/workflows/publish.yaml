name: Publish

on:
  push:
    branches: [master]

env:
  DAGGER_VERSION: 0.21.7

jobs:
  prepare-components:
    name: Prepare components
    runs-on: ubuntu-latest

    outputs:
      components: ${{ steps.components.outputs.components }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: List components
        id: components
        run: |
          components="$(
            {
              find modules -mindepth 1 -maxdepth 1 -type d \
                -exec sh -c 'test -f "$1/dagger.json" && printf "module\t%s\t%s\n" "$(basename "$1")" "$1"' sh {} \;
              if [ -d scenarios ]; then
                find scenarios -mindepth 1 -maxdepth 1 -type d \
                  -exec sh -c 'test -f "$1/dagger.json" && printf "scenario\t%s\t%s\n" "$(basename "$1")" "$1"' sh {} \;
              fi
            } | sort
          )"
          json="$(printf '%s\n' "$components" | python3 -c 'import json, sys; print(json.dumps([{"kind": parts[0], "name": parts[1], "path": parts[2]} for line in sys.stdin if (parts := line.strip().split("\t", 2)) and len(parts) == 3]))')"
          echo "components=$json" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: prepare-components
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJson(needs.prepare-components.outputs.components) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Publish component
        uses: dagger/dagger-for-github@v8.4.1
        with:
          module: ./${{ matrix.component.path }}
          verb: publish
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          version: ${{ env.DAGGER_VERSION }}
