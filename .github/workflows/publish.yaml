name: Publish

on:
  push:
    branches: [master]

env:
  DAGGER_VERSION: 0.20.6

jobs:
  prepare-modules:
    name: Prepare modules
    runs-on: ubuntu-latest

    outputs:
      modules: ${{ steps.modules.outputs.modules }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: List modules
        id: modules
        run: |
          modules="$(
            find modules -mindepth 1 -maxdepth 1 -type d \
              -exec sh -c 'test -f "$1/dagger.json" && basename "$1"' sh {} \; \
              | sort
          )"
          json="$(printf '%s\n' "$modules" | python3 -c 'import json, sys; print(json.dumps([line.strip() for line in sys.stdin if line.strip()]))')"
          echo "modules=$json" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: prepare-modules
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.prepare-modules.outputs.modules) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Publish module
        uses: dagger/dagger-for-github@v8.4.1
        with:
          module: ./modules/${{ matrix.module }}
          verb: publish
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          version: ${{ env.DAGGER_VERSION }}
