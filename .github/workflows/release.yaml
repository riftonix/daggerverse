name: Release

on:
  push:
    tags: ["modules/*/v[0-9]+.[0-9]+.[0-9]+"]

env:
  DAGGER_VERSION: 0.20.6

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Determine module
        id: module
        env:
          TAG: ${{ github.ref_name }}
        run: |
          module="${TAG#modules/}"
          module="${module%%/*}"
          if [ ! -f "modules/$module/dagger.json" ]; then
            printf 'Unknown module from tag %s: %s\n' "$TAG" "$module" >&2
            exit 2
          fi
          echo "name=$module" >> "$GITHUB_OUTPUT"

      - name: Publish module
        uses: dagger/dagger-for-github@v8.4.1
        with:
          module: ./modules/${{ steps.module.outputs.name }}
          verb: publish
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          version: ${{ env.DAGGER_VERSION }}
