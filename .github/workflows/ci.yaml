name: CI

on:
  pull_request:
    branches: [master]

env:
  DAGGER_VERSION: 0.20.8

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Ruff
        uses: astral-sh/ruff-action@v3
        with:
          version: 0.15.12

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up OpenSpec
        run: npm install -g @fission-ai/openspec@1.3.1

      - name: Run Ruff lint
        run: make lint

      - name: Run Ruff format check
        run: make format-check

      - name: Validate OpenSpec
        run: make openspec-validate

      - name: Check Dagger version alignment
        run: make check-dagger-version

  prepare-tests:
    name: Prepare tests
    runs-on: ubuntu-latest

    outputs:
      modules: ${{ steps.modules.outputs.modules }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: List modules with tests
        id: modules
        run: |
          modules="$(
            find modules -mindepth 2 -maxdepth 2 -path 'modules/*/tests' -type d \
              -exec sh -c 'test -f "$1/dagger.json" && basename "$(dirname "$1")"' sh {} \; \
              | sort
          )"
          json="$(printf '%s\n' "$modules" | python3 -c 'import json, sys; print(json.dumps([line.strip() for line in sys.stdin if line.strip()]))')"
          echo "modules=$json" >> "$GITHUB_OUTPUT"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: prepare-tests
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.prepare-tests.outputs.modules) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Dagger
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: ${{ env.DAGGER_VERSION }}

      - name: Run module tests
        run: make tests "${{ matrix.module }}"
