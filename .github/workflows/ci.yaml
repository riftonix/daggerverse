name: CI

on:
  pull_request:
    branches: [master]

env:
  DAGGER_VERSION: 0.20.6

jobs:
  prepare-tests:
    name: Prepare tests
    runs-on: ubuntu-latest

    outputs:
      modules: ${{ steps.modules.outputs.modules }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List modules with tests
        id: modules
        run: |
          modules="$(
            find modules -mindepth 2 -maxdepth 2 -path 'modules/*/tests' -type d \
              -exec sh -c 'test -f "$1/dagger.json" && basename "$(dirname "$1")"' sh {} \; \
              | sort
          )"
          json="$(printf '%s\n' "$modules" | python3 -c 'import json, sys; print(json.dumps([line.strip() for line in sys.stdin if line.strip()]))')"
          echo "modules=$json" >> "$GITHUB_OUTPUT"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: prepare-tests
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.prepare-tests.outputs.modules) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Dagger
        uses: dagger/dagger-for-github@v8.3.0
        with:
          version: ${{ env.DAGGER_VERSION }}

      - name: Run module tests
        run: make tests "${{ matrix.module }}"
