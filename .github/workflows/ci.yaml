name: CI

on:
  pull_request:
    branches: [master]

env:
  DAGGER_VERSION: 0.21.7

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Ruff
        uses: astral-sh/ruff-action@v4.1.0
        with:
          version: 0.15.12

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Set up OpenSpec
        run: npm install -g @fission-ai/openspec@1.3.1

      - name: Run Ruff lint
        run: make lint-check

      - name: Run Ruff format check
        run: make format-check

      - name: Validate OpenSpec
        run: make openspec-validate

      - name: Check Dagger version alignment
        run: make check-dagger-version

  prepare-tests:
    name: Prepare tests
    runs-on: ubuntu-latest

    outputs:
      components: ${{ steps.components.outputs.components }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: List components with tests
        id: components
        run: |
          components="$(
            {
              find modules -mindepth 2 -maxdepth 2 -path 'modules/*/tests' -type d \
                -exec sh -c 'test -f "$1/dagger.json" && printf "module\t%s\n" "$(basename "$(dirname "$1")")"' sh {} \;
              if [ -d scenarios ]; then
                find scenarios -mindepth 2 -maxdepth 2 -path 'scenarios/*/tests' -type d \
                  -exec sh -c 'test -f "$1/dagger.json" && printf "scenario\t%s\n" "$(basename "$(dirname "$1")")"' sh {} \;
              fi
            } | sort
          )"
          json="$(printf '%s\n' "$components" | python3 -c 'import json, sys; print(json.dumps([{"kind": parts[0], "name": parts[1]} for line in sys.stdin if (parts := line.strip().split("\t", 1)) and len(parts) == 2]))')"
          echo "components=$json" >> "$GITHUB_OUTPUT"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: prepare-tests
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJson(needs.prepare-tests.outputs.components) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Dagger
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: ${{ env.DAGGER_VERSION }}

      - name: Run component tests
        run: make tests "${{ matrix.component.kind }}" "${{ matrix.component.name }}"

  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs:
      - quality
      - prepare-tests
      - test
    if: ${{ always() }}

    steps:
      - name: Check CI jobs
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
          PREPARE_TESTS_RESULT: ${{ needs.prepare-tests.result }}
          TEST_RESULT: ${{ needs.test.result }}
        run: |
          test "$QUALITY_RESULT" = success
          test "$PREPARE_TESTS_RESULT" = success
          test "$TEST_RESULT" = success
