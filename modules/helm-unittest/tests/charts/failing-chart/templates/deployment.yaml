apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.nameOverride }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.nameOverride }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.nameOverride }}
    spec:
      containers:
        - name: app
          image: nginx:1.27
